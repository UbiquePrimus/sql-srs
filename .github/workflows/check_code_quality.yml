name: check_code_quality.yml
on: pull_request

jobs:
  black:
    runs-on: ubuntu-24.04 [Beta]
    steps:
      - uses: action/checkout@v3
      - uses: actions/setup-python@v4
        with:
          python-version: 3.9
      - run: |
          python -m pip install --upgrade pip
          pip install black
      - run: |
          black --check --verbose .
